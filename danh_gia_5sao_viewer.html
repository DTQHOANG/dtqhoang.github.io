const CDN = 'https://cf.shopee.vn/file/';
let lbImages = [], lbIdx = 0;

function imgUrl(id) { return CDN + id; }

function openLightbox(imgs, idx) {
  lbImages = imgs; lbIdx = idx;
  document.getElementById('lb-img').src = imgUrl(imgs[idx]);
  document.getElementById('lb-caption').textContent = `${idx+1} / ${imgs.length}`;
  document.getElementById('lightbox').classList.add('open');
}

function lbNav(dir) {
  lbIdx = (lbIdx + dir + lbImages.length) % lbImages.length;
  document.getElementById('lb-img').src = imgUrl(lbImages[lbIdx]);
  document.getElementById('lb-caption').textContent = `${lbIdx+1} / ${lbImages.length}`;
}

document.getElementById('lb-close').onclick = () => document.getElementById('lightbox').classList.remove('open');
document.getElementById('lightbox').addEventListener('click', e => { if(e.target.id==='lightbox') document.getElementById('lightbox').classList.remove('open'); });
document.addEventListener('keydown', e => { if(e.key==='Escape') document.getElementById('lightbox').classList.remove('open'); if(e.key==='ArrowLeft') lbNav(-1); if(e.key==='ArrowRight') lbNav(1); });
